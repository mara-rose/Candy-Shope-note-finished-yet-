<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/Shared/generale.css" />
    <link rel="stylesheet" href="styles/pages/checkout/checkout-header.css" />
    <link rel="stylesheet" href="styles/pages/checkout/checkout.css" />
    <link rel="stylesheet" href="styles/Shared/CandyCloud-header.css" />
  </head>
  <body>
    <div class="checkout-header">
      <div class="header-content">
        <div class="checkout-header-left-section">
          <a href="CandyCloud.html">
            <img class="candy-logo" src="icons/candy-logo.png" />
            <img class="candy-logo-mobile" src="icons/candy-logo-mobile.png" />
          </a>
        </div>
        <div class="checkout-header-middle-section">
          Checkout (<a
            class="return-to-home-link js-return-to-home-link"
            href="CandyCloud.html"
          ></a
          >)
        </div>
        <div class="checkout-header-right-section">
          <img src="icons/checkout-lock-icon.png" />
        </div>
      </div>
    </div>

    <div class="checkout-main">
      <div class="page-title">Review your order</div>
      <div class="checkout-grid">
        <div class="order-summary js-order-summary"></div>

        <div class="payment-summary js-payment-summary">
          
        </div>
      </div>
    </div>
    <script type="module" src="scripts/checkout.js"></script>
  </body>
</html>
